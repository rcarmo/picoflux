services:
  miniflux:
    image: ${MINIFLUX_IMAGE:-miniflux/miniflux:latest}
    container_name: miniflux
    restart: always
    ports:
      - "80:8080"
    environment:
      # Pure-Go SQLite backend: the database is a single file stored on a volume.
      - DATABASE_URL=/data/picoflux.db
      - RUN_MIGRATIONS=1
      - CREATE_ADMIN=1
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=test123
      - DEBUG=1
    volumes:
      - miniflux-db:/data
    # Optional health check:
    # healthcheck:
    #  test: ["CMD", "/usr/bin/miniflux", "-healthcheck", "auto"]
volumes:
  miniflux-db:
