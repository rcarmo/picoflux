services:
  app:
    image: mcr.microsoft.com/devcontainers/go:1-trixie # https://www.debian.org/releases/trixie/index.en.html
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      - CREATE_ADMIN=1
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=test123
      # Pure-Go SQLite backend: the database is a single file inside the workspace.
      - DATABASE_URL=/workspace/nanoflux.db
  apprise:
    image: caronc/apprise:1.0
    restart: unless-stopped
    hostname: apprise
